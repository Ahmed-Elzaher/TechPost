<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .bg { fill: #0F1419; }
      .newspaper { fill: #6366F1; }
      .accent { fill: #08B981; }
      .text-line { fill: #08B981; }
      .highlight { fill: #F5F5F5; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="512" height="512"/>

  <!-- Subtle shadow/depth -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main newspaper/article frame -->
  <g filter="url(#shadow)">
    <rect class="newspaper" x="140" y="100" width="280" height="320" rx="28" ry="28"/>
  </g>

  <!-- RSS/Signal indicator - curved lines (top-left) -->
  <g class="accent">
    <!-- Outer arc -->
    <path d="M 100 80 A 35 35 0 0 1 135 115" fill="none" stroke="#08B981" stroke-width="12" stroke-linecap="round"/>
    <!-- Middle arc -->
    <path d="M 100 110 A 5 5 0 0 1 105 115" fill="none" stroke="#08B981" stroke-width="12" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="100" cy="150" r="12" fill="#08B981"/>
  </g>

  <!-- Headline lines on newspaper -->
  <g class="text-line">
    <!-- First headline (thick) -->
    <rect x="170" y="150" width="180" height="8" rx="4"/>
    <!-- Second line -->
    <rect x="170" y="175" width="200" height="5" rx="2.5"/>
    <!-- Third line -->
    <rect x="170" y="195" width="195" height="5" rx="2.5"/>
  </g>

  <!-- Decorative dots/accents next to headlines -->
  <g class="accent">
    <circle cx="155" cy="154" r="4" opacity="0.7"/>
    <circle cx="155" cy="179" r="3" opacity="0.5"/>
  </g>

  <!-- Additional article lines for content look -->
  <g class="text-line" opacity="0.6">
    <rect x="170" y="230" width="200" height="4" rx="2"/>
    <rect x="170" y="245" width="190" height="4" rx="2"/>
    <rect x="170" y="260" width="195" height="4" rx="2"/>
    <rect x="170" y="275" width="180" height="4" rx="2"/>
    <rect x="170" y="290" width="200" height="4" rx="2"/>
  </g>

  <!-- Bottom accent - small "T" monogram -->
  <g class="accent">
    <circle cx="410" cy="390" r="28" fill="none" stroke="#08B981" stroke-width="2" opacity="0.4"/>
    <text x="410" y="405" font-size="32" font-weight="bold" text-anchor="middle" fill="#08B981" font-family="Arial, sans-serif">T</text>
  </g>

  <!-- Highlight details - subtle white accents -->
  <g class="highlight" opacity="0.3">
    <rect x="170" y="130" width="60" height="3" rx="1.5" fill="#F5F5F5"/>
  </g>
</svg>